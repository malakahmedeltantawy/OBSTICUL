<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outdoor Scavenger Hunt</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            color: #333;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            background: white;
            margin: 20px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; margin-top: 0; }
        .status-box {
            background: #eef2f7;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .timer {
            font-size: 2rem;
            color: #e74c3c;
            font-weight: bold;
            margin: 15px 0;
        }
        .scores {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            font-size: 1.2rem;
        }
        .player-score {
            padding: 10px 20px;
            border-radius: 8px;
            background: #dfe6e9;
        }
        .active-player {
            background: #2ecc71;
            color: white;
        }
        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            font-size: 1rem;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            margin: 5px;
        }
        button:hover { background: #2980b9; }
        .hidden { display: none; }
        #photoPreview {
            max-width: 100%;
            max-height: 200px;
            margin-top: 15px;
            border-radius: 8px;
            display: none;
        }
        .file-input-label {
            display: inline-block;
            background: #9b59b6;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Scavenger Hunt</h1>
    
    <div class="scores">
        <div id="p1Box" class="player-score active-player">Player 1: <span id="p1Score">0</span></div>
        <div id="p2Box" class="player-score">Player 2: <span id="p2Score">0</span></div>
    </div>

    <div class="timer" id="timerDisplay">10:00</div>

    <div id="setupScreen">
        <h2 id="promptInstruction">Player 1: Type something for Player 2 to find!</h2>
        <input type="text" id="itemPrompt" placeholder="e.g., A pinecone, something red...">
        <br>
        <button onclick="startHunt()">Set Target & Start Timer</button>
    </div>

    <div id="huntScreen" class="hidden">
        <h2>Target: <span id="targetItem" style="color: #e67e22;"></span></h2>
        <p>Go find it before time runs out!</p>
        
        <label for="photoUpload" class="file-input-label">📸 Take/Upload Picture</label>
        <input type="file" id="photoUpload" accept="image/*" capture="environment" style="display: none;" onchange="previewPhoto()">
        
        <br>
        <img id="photoPreview" alt="Preview">
        <br>
        <button id="foundBtn" onclick="itemFound()" style="background: #2ecc71; display: none;">Found It! (+10 pts)</button>
    </div>

    <div id="winScreen" class="hidden">
        <h2 id="winnerMessage" style="color: #2ecc71;"></h2>
        <button onclick="resetGame()">Play Again</button>
    </div>
</div>

<script>
    let scores = { 1: 0, 2: 0 };
    let giver = 1;   // Person choosing the item
    let hunter = 2;  // Person finding the item
    let timer;
    let timeLeft = 600; // 10 minutes in seconds

    function startHunt() {
        const itemInput = document.getElementById('itemPrompt');
        if (itemInput.value.trim() === "") {
            alert("Please type an item first!");
            return;
        }

        // Set target text
        document.getElementById('targetItem').innerText = itemInput.value;
        itemInput.value = ""; // Clear input

        // Switch screens
        document.getElementById('setupScreen').classList.add('hidden');
        document.getElementById('huntScreen').classList.remove('hidden');

        // Start 10-minute timer
        timeLeft = 600;
        updateTimerDisplay();
        clearInterval(timer);
        timer = setInterval(countDown, 1000);
    }

    function countDown() {
        if (timeLeft <= 0) {
            clearInterval(timer);
            alert("Time's up! Switching turns.");
            switchTurns();
        } else {
            timeLeft--;
            updateTimerDisplay();
        }
    }

    function updateTimerDisplay() {
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;
        if (seconds < 10) seconds = "0" + seconds;
        document.getElementById('timerDisplay').innerText = `${minutes}:${seconds}`;
    }

    function previewPhoto() {
        const file = document.getElementById('photoUpload').files[0];
        const preview = document.getElementById('photoPreview');
        const foundBtn = document.getElementById('foundBtn');
        
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = "inline-block";
                foundBtn.style.display = "inline-block"; // Show the claim points button
            }
            reader.readAsDataURL(file);
        }
    }

    function itemFound() {
        clearInterval(timer);
        
        // Award 10 points to the hunter
        scores[hunter] += 10;
        document.getElementById(`p${hunter}Score`).innerText = scores[hunter];

        // Check win condition
        if (scores[hunter] >= 100) {
            endGame(`Player ${hunter} Wins the Game!`);
            return;
        }

        alert(`Nice! Player ${hunter} gets 10 points.`);
        switchTurns();
    }

    function switchTurns() {
        // Swap hunter and giver roles
        let temp = giver;
        giver = hunter;
        hunter = temp;

        // Update CSS highlights on scoreboard
        document.getElementById(`p${giver}Box`).classList.add('active-player');
        document.getElementById(`p${hunter}Box`).classList.remove('active-player');

        // Update text for the setup screen
        document.getElementById('promptInstruction').innerText = `Player ${giver}: Type something for Player ${hunter} to find!`;

        // Reset UI elements
        document.getElementById('photoPreview').style.display = "none";
        document.getElementById('photoUpload').value = "";
        document.getElementById('foundBtn').style.display = "none";
        document.getElementById('timerDisplay').innerText = "10:00";

        // Bring back setup screen
        document.getElementById('huntScreen').classList.add('hidden');
        document.getElementById('setupScreen').classList.remove('hidden');
    }

    function endGame(message) {
        document.getElementById('huntScreen').classList.add('hidden');
        document.getElementById('setupScreen').classList.add('hidden');
        document.getElementById('winScreen').classList.remove('hidden');
        document.getElementById('winnerMessage').innerText = message;
    }

    function resetGame() {
        scores = { 1: 0, 2: 0 };
        giver = 1;
        hunter = 2;
        document.getElementById('p1Score').innerText = "0";
        document.getElementById('p2Score').innerText = "0";
        document.getElementById('p1Box').classList.add('active-player');
        document.getElementById('p2Box').classList.remove('active-player');
        document.getElementById('promptInstruction').innerText = "Player 1: Type something for Player 2 to find!";
        document.getElementById('winScreen').classList.add('hidden');
        document.getElementById('setupScreen').classList.remove('hidden');
        document.getElementById('timerDisplay').innerText = "10:00";
    }
</script>

</body>
</html>
