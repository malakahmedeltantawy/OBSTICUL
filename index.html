<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Obstacle Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #gameContainer {
            position: relative;
            width: 600px;
            height: 250px;
        }

        canvas {
            background-color: #ffffff;
            border: 4px solid #333;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        #startMenu {
            position: absolute;
            top: 4px; 
            left: 4px;
            width: 600px;
            height: 250px;
            background-color: rgba(0, 0, 0, 0.85);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10; 
        }

        #startMenu h1 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #FFD700;
        }

        .diff-btn {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 30px;
            margin: 5px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 150px;
            transition: 0.2s;
        }

        .diff-btn:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        #btn-easy { background-color: #28a745; }
        #btn-easy:hover { background-color: #1e7e34; }
        
        #btn-hard { background-color: #DC3545; }
        #btn-hard:hover { background-color: #bd2130; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="startMenu">
            <h1>Select Difficulty</h1>
            <button class="diff-btn" id="btn-easy" onclick="startGame('easy')">Easy</button>
            <button class="diff-btn" id="btn-medium" onclick="startGame('medium')">Medium</button>
            <button class="diff-btn" id="btn-hard" onclick="startGame('hard')">Hard</button>
        </div>

        <canvas id="gameCanvas" width="600" height="250"></canvas>
    </div>

    <script>
        // --- GAME SETUP ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const startMenu = document.getElementById("startMenu");

        let score = 0;
        let gameOver = false;
        let gameStarted = false; 
        let currentDifficulty = 'medium'; 

        // Jump tracking
        let jumpCount = 0;
        const maxJumps = 2; 

        const player = { 
            x: 50, 
            y: 200, 
            width: 30, 
            height: 30, 
            velocityY: 0, 
            gravity: 1.0, 
            jumpPower: -12.5 // Adjusted jump height for better control
        };
        
        const obstacles = [];
        const coins = []; 
        let gameSpeed = 5;
        let baseSpeed = 5; 

        // --- GAME CONTROLS ---
        document.addEventListener("keydown", function(event) {
            if (event.code === "Space") {
                if (gameOver) {
                    resetGame();
                } else if (gameStarted && jumpCount < maxJumps) {
                    // Instantly reset downward velocity so the second jump feels powerful
                    player.velocityY = player.jumpPower;
                    jumpCount++; 
                }
            }
        });

        // --- GAME FUNCTIONS ---
        function startGame(difficulty) {
            currentDifficulty = difficulty; 

            if (difficulty === 'easy') {
                baseSpeed = 4;
                player.gravity = 0.8; // More airtime
            } else if (difficulty === 'medium') {
                baseSpeed = 5.5;
                player.gravity = 1.0; // Standard physics
            } else if (difficulty === 'hard') {
                baseSpeed = 7.5;
                player.gravity = 1.3; // Snappy, faster physics
            }

            startMenu.style.display = "none";
            gameStarted = true;
            resetGame();
        }

        function spawnObstacle() {
            let width = 20 + Math.random() * 20;
            let height = 30;

            if (currentDifficulty === 'easy') {
                height = 20 + Math.random() * 15; 
            } else if (currentDifficulty === 'medium') {
                const isTall = Math.random() > 0.5;
                height = isTall ? (45 + Math.random() * 10) : (25 + Math.random() * 10);
            } else if (currentDifficulty === 'hard') {
                height = 60 + Math.random() * 15;
            }
            
            obstacles.push({ 
                x: canvas.width, 
                y: 230 - height, 
                width: width, 
                height: height 
            });
        }

        function spawnCoin() {
            const isHigh = Math.random() > 0.5;
            const yPos = isHigh ? (40 + Math.random() * 30) : (120 + Math.random() * 40); 
            
            coins.push({
                x: canvas.width,
                y: yPos,
                radius: 10,
                collected: false
            });
        }

        function resetGame() {
            obstacles.length = 0;
            coins.length = 0; 
            score = 0;
            gameOver = false;
            player.y = 200;
            player.velocityY = 0;
            jumpCount = 0; 
            gameSpeed = baseSpeed; 
        }

        function updateLogic() {
            if (!gameStarted || gameOver) return; 

            // 1. Update Player Physics
            player.velocityY += player.gravity;
            player.y += player.velocityY;

            // Strict floor boundary check
            if (player.y >= 200) {
                player.y = 200;
                player.velocityY = 0;
                jumpCount = 0; // Safely reset jumps on the ground
            }

            // 2. Update Obstacles
            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].x -= gameSpeed;

                if (player.x < obstacles[i].x + obstacles[i].width &&
                    player.x + player.width > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].height &&
                    player.y + player.height > obstacles[i].y) {
                    gameOver = true;
                }
            }

            // 3. Update Coins 
            for (let i = 0; i < coins.length; i++) {
                coins[i].x -= gameSpeed;

                let distX = Math.abs(coins[i].x - (player.x + player.width / 2));
                let distY = Math.abs(coins[i].y - (player.y + player.height / 2));

                if (distX <= (player.width / 2 + coins[i].radius) && distY <= (player.height / 2 + coins[i].radius)) {
                    if (!coins[i].collected) {
                        coins[i].collected = true;
                        score += 50; 
                    }
                }
            }

            for (let i = coins.length - 1; i >= 0; i--) {
                if (coins[i].x < -20 || coins[i].collected) {
                    coins.splice(i, 1);
                }
            }

            // 4. Score Points
            if (obstacles.length > 0 && obstacles[0].x < -obstacles[0].width) {
                obstacles.shift();
                score += 10; 
                
                if (score % 50 === 0) {
                    gameSpeed += 0.5; 
                }
            }

            // 5. Spawn logic
            if (Math.random() < 0.02) {
                if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 250) {
                    spawnObstacle();
                }
            }

            if (Math.random() < 0.015) { 
                spawnCoin();
            }
        }

        function drawGraphics() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Ground
            ctx.fillStyle = "#555";
            ctx.fillRect(0, 230, canvas.width, 20);

            // Draw Player
            ctx.fillStyle = "#007BFF"; 
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Draw Obstacles
            ctx.fillStyle = "#DC3545"; 
            for (let i = 0; i < obstacles.length; i++) {
                ctx.fillRect(obstacles[i].x, obstacles[i].y, obstacles[i].width, obstacles[i].height);
            }

            // Draw Coins
            ctx.fillStyle = "#FFD700"; 
            for (let i = 0; i < coins.length; i++) {
                ctx.beginPath();
                ctx.arc(coins[i].x, coins[i].y, coins[i].radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.closePath();
            }

            // Draw Score
            ctx.fillStyle = "#333";
            ctx.font = "bold 20px sans-serif";
            ctx.fillText("Score: " + score, 20, 35);

            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "white";
                ctx.font = "bold 36px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER!", canvas.width / 2, canvas.height / 2 - 10);
                
                ctx.font = "20px sans-serif";
                ctx.fillText("Press SPACE to Restart", canvas.width / 2, canvas.height / 2 + 30);
                
                ctx.font = "14px sans-serif";
                ctx.fillStyle = "#ccc";
                ctx.fillText("(Refresh the page to change difficulty)", canvas.width / 2, canvas.height / 2 + 60);
                
                ctx.textAlign = "left"; 
            }
        }

        function gameLoop() {
            updateLogic();
            drawGraphics();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
