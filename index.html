<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Obstacle Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            background-color: #ffffff;
            border: 4px solid #333;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="600" height="250"></canvas>

    <script>
        // --- GAME SETUP ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let isJumping = false;
        let score = 0;
        let gameOver = false;

        const player = { 
            x: 50, 
            y: 200, 
            width: 30, 
            height: 30, 
            velocityY: 0, 
            gravity: 1.2, 
            jumpPower: -14 
        };
        
        const obstacles = [];
        const coins = []; // <-- NEW: Array to hold our coins
        let gameSpeed = 5;

        // --- GAME CONTROLS ---
        document.addEventListener("keydown", function(event) {
            if (event.code === "Space") {
                if (gameOver) {
                    resetGame();
                } else if (!isJumping) {
                    player.velocityY = player.jumpPower;
                    isJumping = true;
                }
            }
        });

        // --- GAME FUNCTIONS ---
        function spawnObstacle() {
            const width = 20 + Math.random() * 20;
            const height = 30 + Math.random() * 30;
            obstacles.push({ 
                x: canvas.width, 
                y: 230 - height, 
                width: width, 
                height: height 
            });
        }

        // <-- NEW: Function to spawn coins
        function spawnCoin() {
            // Spawn coins up in the air so the player has to jump
            const yPos = 100 + Math.random() * 60; 
            coins.push({
                x: canvas.width,
                y: yPos,
                radius: 10,
                collected: false
            });
        }

        function resetGame() {
            obstacles.length = 0;
            coins.length = 0; // Clear coins on restart
            score = 0;
            gameOver = false;
            player.y = 200;
            player.velocityY = 0;
            gameSpeed = 5;
        }

        function updateLogic() {
            if (gameOver) return;

            // 1. Update Player Physics
            player.velocityY += player.gravity;
            player.y += player.velocityY;

            if (player.y >= 200) {
                player.y = 200;
                isJumping = false;
                player.velocityY = 0;
            }

            // 2. Update Obstacles
            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].x -= gameSpeed;

                // Hit an obstacle?
                if (player.x < obstacles[i].x + obstacles[i].width &&
                    player.x + player.width > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].height &&
                    player.y + player.height > obstacles[i].y) {
                    gameOver = true;
                }
            }

            // 3. Update Coins (NEW)
            for (let i = 0; i < coins.length; i++) {
                coins[i].x -= gameSpeed;

                // Did the player touch the coin? (Simple collision math)
                let distX = Math.abs(coins[i].x - (player.x + player.width / 2));
                let distY = Math.abs(coins[i].y - (player.y + player.height / 2));

                if (distX <= (player.width / 2 + coins[i].radius) && distY <= (player.height / 2 + coins[i].radius)) {
                    if (!coins[i].collected) {
                        coins[i].collected = true;
                        score += 50; // Bonus points!
                    }
                }
            }

            // Remove collected coins or coins that went off screen
            for (let i = coins.length - 1; i >= 0; i--) {
                if (coins[i].x < -20 || coins[i].collected) {
                    coins.splice(i, 1);
                }
            }

            // 4. Score Points & Remove old obstacles
            if (obstacles.length > 0 && obstacles[0].x < -obstacles[0].width) {
                obstacles.shift();
                score += 10; 
                
                if (score % 50 === 0) {
                    gameSpeed += 0.5; 
                }
            }

            // 5. Randomly spawn new things
            if (Math.random() < 0.02) {
                if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 250) {
                    spawnObstacle();
                }
            }

            // NEW: Randomly spawn a coin (1% chance every frame)
            if (Math.random() < 0.01) {
                spawnCoin();
            }
        }

        function drawGraphics() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Ground
            ctx.fillStyle = "#555";
            ctx.fillRect(0, 230, canvas.width, 20);

            // Draw Player
            ctx.fillStyle = "#007BFF"; 
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Draw Obstacles
            ctx.fillStyle = "#DC3545"; 
            for (let i = 0; i < obstacles.length; i++) {
                ctx.fillRect(obstacles[i].x, obstacles[i].y, obstacles[i].width, obstacles[i].height);
            }

            // Draw Coins (NEW)
            ctx.fillStyle = "#FFD700"; // Gold Color
            for (let i = 0; i < coins.length; i++) {
                ctx.beginPath();
                ctx.arc(coins[i].x, coins[i].y, coins[i].radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.closePath();
            }

            // Draw Score
            ctx.fillStyle = "#333";
            ctx.font = "bold 20px sans-serif";
            ctx.fillText("Score: " + score, 20, 35);

            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "white";
                ctx.font = "bold 36px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER!", canvas.width / 2, canvas.height / 2 - 10);
                
                ctx.font = "20px sans-serif";
                ctx.fillText("Press SPACE to Restart", canvas.width / 2, canvas.height / 2 + 30);
                ctx.textAlign = "left"; 
            }
        }

        function gameLoop() {
            updateLogic();
            drawGraphics();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
